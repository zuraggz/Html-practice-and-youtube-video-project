<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    .Subscribe{
        background-color: rgb(204, 0, 0);
        /* keyword : value;
           ასეთი syntax აქვს */
        color: white;
        /* ტექსტის ფერი */
        border:none;
        /* ჩარჩო */
        height: 36px;
        /* button heigh- განვსაზღვრავთ სიმაღლეს პიქსელებით */
        width: 120px;
        /* სიგანე */
        border-radius: 2px;
        /* რამდენად მრგვალი გვინდა ღილაკი იყოს */
        cursor: pointer;
        /* ღილაკი რო შეიცვალოს მიტანისას  */
    }
    .JOIN{
        background-color: white;
        color: rgb(6, 95, 212);
        cursor: pointer;
        border-color: rgb(6, 95, 212);
        border-style: solid;
        /* 1 ფერი რომ იყოს border */
        border-width: 1px;
        /* სიგანე ჩარჩო */
        height: 36px;
        width: 62px;
        border-radius: 2px;
        margin-left: 10px;
        /* some space on left   */
        
    }
    .Tweet{
        background-color: rgb(29, 155, 240);
        color: white;
        border: none;
        border-radius: 20px;
        height: 36px;
        width: 74px;
        font-weight: bold;
        font-size: 15px;
        margin-left: 10px;

    }
</style>
</head>
<body>
    <button class="Subscribe">Subscribe</button>
    <!-- გამოიყენე კლასი რათა კონკრეტულ ელემენტს შეუცვალო რაიმე -->
     <button class="JOIN">JOIN</button>
     <button class="Tweet">Tweet</button>
</body>
</html>
